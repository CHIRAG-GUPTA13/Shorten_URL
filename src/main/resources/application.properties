# Default Configuration
# This configuration is used as fallback and for development

# Active Profile Configuration
# Default profile is 'local' for development
# Set via: spring.profiles.active=prod or environment variable SPRING_PROFILES_ACTIVE
spring.profiles.active=local
spring.application.name=urlshortener

# Common Datasource Configuration (used as defaults)
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=YourSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong123456
app.jwt.expiration-milliseconds=86400000

# Default application behavior
# Use SQL migrations from setup folder
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:setup/schema_v1.sql,classpath:setup/schema_v2.sql
