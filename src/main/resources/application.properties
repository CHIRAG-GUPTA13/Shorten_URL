# Default Configuration
# This configuration is used as fallback and for development

# Active Profile Configuration
# Default profile is 'local' for development
# Set via: spring.profiles.active=prod or environment variable SPRING_PROFILES_ACTIVE
spring.profiles.active=local
spring.application.name=urlshortener

# Common Datasource Configuration (used as defaults)
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=YourSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong123456
app.jwt.expiration-milliseconds=86400000

# Default application behavior
# Use SQL migrations from setup folder
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:setup/schema_v1.sql,classpath:setup/schema_v2.sql

# Cleanup Scheduler Configuration
# Enable/disable automatic cleanup of expired URLs
app.cleanup.expired-urls.enabled=true
# Cron expression for cleanup task (default: every hour at minute 0)
app.cleanup.expired-urls.cron=0 0 * * * *
# Batch size for processing expired URLs
app.cleanup.expired-urls.batch-size=100

# Redis Cache Configuration
# Enable/disable Redis caching
app.cache.redis.enabled=true
# Redis host (default: localhost)
spring.data.redis.host=localhost
# Redis port (default: 6379)
spring.data.redis.port=6379
# Redis password (optional)
# spring.data.redis.password=
# Cache TTL in seconds (default: 86400 = 24 hours)
app.cache.url.ttl=86400

# Rate Limiting Configuration
# Enable/disable rate limiting
app.ratelimit.enabled=true
# Maximum requests allowed per window
app.ratelimit.shorten.requests=10
# Time window in seconds (1 minute = 60 seconds)
app.ratelimit.shorten.window-seconds=60
# Enable Redis backend for distributed rate limiting (survives restarts)
app.ratelimit.redis.enabled=true

# QR Code Configuration
# QR code width in pixels
app.qr.width=300
# QR code height in pixels
app.qr.height=300
# Base URL prepended to shortCode to form full short URL
app.qr.base-url=http://localhost:8080
# QR code cache TTL in seconds (7 days = 604800 seconds)
app.qr.cache.ttl=604800

# Bulk URL Shortening Configuration
# Maximum URLs per bulk job
app.bulk.max-urls-per-job=10000
# Base URL for shortened URLs in bulk results
app.bulk.base-url=http://localhost:8080
